basePath: /api
definitions:
  internal_transport_handler.changePasswordRequest:
    properties:
      current_password:
        example: oldpass
        type: string
      new_password:
        example: newpass
        type: string
    type: object
  internal_transport_handler.clientDTO:
    properties:
      expiry:
        type: string
      id:
        type: string
      inboundId:
        type: string
      name:
        type: string
      startAfterFirstUse:
        type: boolean
      status:
        type: string
      subscription:
        type: string
      totalQuota:
        type: integer
      usedDown:
        type: integer
      usedUp:
        type: integer
      uuid:
        type: string
    type: object
  internal_transport_handler.clientLinksDTO:
    properties:
      link:
        type: string
      subscription:
        type: string
    type: object
  internal_transport_handler.confirmTOTPRequest:
    properties:
      code:
        example: "123456"
        type: string
    type: object
  internal_transport_handler.coreStatusDTO:
    properties:
      pid:
        type: integer
      running:
        type: boolean
      uptimeSeconds:
        type: integer
      version:
        type: string
    type: object
  internal_transport_handler.createClientRequest:
    properties:
      expiry:
        type: string
      inboundId:
        type: string
      name:
        type: string
      startAfterFirstUse:
        type: boolean
      totalQuota:
        type: integer
    type: object
  internal_transport_handler.disableTOTPRequest:
    properties:
      code:
        example: "123456"
        type: string
    type: object
  internal_transport_handler.diskSegmentDTO:
    properties:
      color:
        type: string
      label:
        type: string
      totalBytes:
        type: integer
      usedBytes:
        type: integer
    type: object
  internal_transport_handler.inboundDTO:
    properties:
      clientCount:
        type: integer
      createdAt:
        type: string
      dest:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      port:
        type: integer
      protocol:
        type: string
      remark:
        type: string
      settings:
        $ref: '#/definitions/internal_transport_handler.inboundSettingsDTO'
      sni:
        type: string
      tls:
        type: string
      transmission:
        type: string
    type: object
  internal_transport_handler.inboundRequest:
    properties:
      acmeDomain:
        type: string
      acmeEmail:
        type: string
      certPath:
        type: string
      dest:
        type: string
      keyPath:
        type: string
      port:
        type: integer
      protocol:
        type: string
      remark:
        type: string
      sni:
        type: string
      tls:
        type: string
      transmission:
        type: string
    type: object
  internal_transport_handler.inboundSettingsDTO:
    properties:
      flow:
        type: string
      grpcServiceName:
        type: string
      publicKey:
        type: string
      shortId:
        type: string
      wsPath:
        type: string
    type: object
  internal_transport_handler.logEntryDTO:
    properties:
      id:
        type: string
      level:
        type: string
      message:
        type: string
      t:
        type: integer
    type: object
  internal_transport_handler.loginRecoveryRequest:
    properties:
      code:
        example: 1234-5678
        type: string
      username:
        example: admin
        type: string
    type: object
  internal_transport_handler.loginRequest:
    properties:
      password:
        example: admin
        type: string
      totp_code:
        example: "123456"
        type: string
      username:
        example: admin
        type: string
    type: object
  internal_transport_handler.meResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_totp_enabled:
        type: boolean
      totp_confirmed_at:
        type: string
      username:
        type: string
    type: object
  internal_transport_handler.metricsDTO:
    properties:
      coreRunning:
        type: boolean
      coreVersion:
        type: string
      cpu:
        type: number
      diskSegments:
        items:
          $ref: '#/definitions/internal_transport_handler.diskSegmentDTO'
        type: array
      downloadBps:
        type: integer
      inboundsActive:
        type: integer
      monthBytes:
        type: integer
      onlineNow:
        type: integer
      ram:
        type: number
      ramTotalBytes:
        type: integer
      ramUsedBytes:
        type: integer
      swap:
        type: number
      swapTotalBytes:
        type: integer
      swapUsedBytes:
        type: integer
      todayBytes:
        type: integer
      totalReceived:
        type: integer
      totalSent:
        type: integer
      totalUsers:
        type: integer
      uploadBps:
        type: integer
      uptimeSeconds:
        type: integer
    type: object
  internal_transport_handler.setStatusRequest:
    properties:
      status:
        type: string
    type: object
  internal_transport_handler.trafficPointDTO:
    properties:
      down:
        type: integer
      t:
        type: integer
      up:
        type: integer
    type: object
  internal_transport_handler.updateClientRequest:
    properties:
      expiry:
        type: string
      inboundId:
        type: string
      name:
        type: string
      startAfterFirstUse:
        type: boolean
      status:
        type: string
      totalQuota:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: Local-first web panel for managing a sing-box process.
  title: SingGrok API
  version: 0.1.0
paths:
  /:
    get:
      description: Returns panel name and version.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Root endpoint
      tags:
      - health
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the password for the currently authenticated admin.
      parameters:
      - description: Password change payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change admin password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in with username and password. If 2FA is enabled and no TOTP
        code is provided, returns 403 with requires_totp.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: requires_totp
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate admin
      tags:
      - auth
  /auth/login/recovery:
    post:
      consumes:
      - application/json
      description: Authenticates using a one-time recovery code (bypasses TOTP).
      parameters:
      - description: Recovery login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.loginRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login with recovery code
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears the auth token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the authenticated admin's profile without secrets.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.meResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current admin profile
      tags:
      - auth
  /auth/totp/confirm:
    post:
      consumes:
      - application/json
      description: Verifies the TOTP code and enables 2FA. Returns 8 one-time recovery
        codes.
      parameters:
      - description: TOTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.confirmTOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Confirm TOTP setup
      tags:
      - auth
  /auth/totp/disable:
    post:
      consumes:
      - application/json
      description: Disables 2FA. Requires a valid TOTP code or recovery code.
      parameters:
      - description: TOTP or recovery code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.disableTOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Disable TOTP
      tags:
      - auth
  /auth/totp/setup:
    post:
      description: Generates a TOTP secret and returns a QR code URI for the admin
        to scan.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Initiate TOTP setup
      tags:
      - auth
  /clients:
    get:
      parameters:
      - description: Filter by inbound ID
        in: query
        name: inboundId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_transport_handler.clientDTO'
            type: array
      security:
      - BearerAuth: []
      summary: List clients
      tags:
      - clients
    post:
      consumes:
      - application/json
      parameters:
      - description: Client
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.createClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_transport_handler.clientDTO'
      security:
      - BearerAuth: []
      summary: Create a client
      tags:
      - clients
  /clients/{id}:
    delete:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a client
      tags:
      - clients
    get:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.clientDTO'
      security:
      - BearerAuth: []
      summary: Get a client
      tags:
      - clients
    put:
      consumes:
      - application/json
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      - description: Patch
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.updateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.clientDTO'
      security:
      - BearerAuth: []
      summary: Update a client
      tags:
      - clients
  /clients/{id}/links:
    get:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.clientLinksDTO'
      security:
      - BearerAuth: []
      summary: Get a client's share link and subscription URL
      tags:
      - clients
  /clients/{id}/reset-traffic:
    post:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.clientDTO'
      security:
      - BearerAuth: []
      summary: Reset a client's traffic counters
      tags:
      - clients
  /clients/{id}/status:
    post:
      consumes:
      - application/json
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.setStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.clientDTO'
      security:
      - BearerAuth: []
      summary: Set a client's status
      tags:
      - clients
  /core/config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Preview the generated config
      tags:
      - core
  /core/reload:
    post:
      description: Renders config from the database, runs `sing-box check`, installs
        it and reloads the core. A failed check returns 400 with the validation error
        and leaves the live config untouched.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Regenerate, validate and apply the config
      tags:
      - core
  /core/restart:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Restart the core
      tags:
      - core
  /core/start:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Start the core
      tags:
      - core
  /core/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.coreStatusDTO'
      security:
      - BearerAuth: []
      summary: Core process status
      tags:
      - core
  /core/stop:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Stop the core
      tags:
      - core
  /core/version:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Core version
      tags:
      - core
  /dashboard/metrics:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.metricsDTO'
      security:
      - BearerAuth: []
      summary: Dashboard metrics snapshot
      tags:
      - dashboard
  /dashboard/traffic:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_transport_handler.trafficPointDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Recent throughput history
      tags:
      - dashboard
  /health:
    get:
      description: Returns server health status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /inbounds:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_transport_handler.inboundDTO'
            type: array
      security:
      - BearerAuth: []
      summary: List inbounds
      tags:
      - inbounds
    post:
      consumes:
      - application/json
      parameters:
      - description: Inbound
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.inboundRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_transport_handler.inboundDTO'
      security:
      - BearerAuth: []
      summary: Create an inbound
      tags:
      - inbounds
  /inbounds/{id}:
    delete:
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an inbound
      tags:
      - inbounds
    get:
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.inboundDTO'
      security:
      - BearerAuth: []
      summary: Get an inbound
      tags:
      - inbounds
    put:
      consumes:
      - application/json
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      - description: Inbound
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_handler.inboundRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.inboundDTO'
      security:
      - BearerAuth: []
      summary: Update an inbound
      tags:
      - inbounds
  /inbounds/{id}/clone:
    post:
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_transport_handler.inboundDTO'
      security:
      - BearerAuth: []
      summary: Clone an inbound
      tags:
      - inbounds
  /inbounds/{id}/toggle:
    post:
      parameters:
      - description: Inbound ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_handler.inboundDTO'
      security:
      - BearerAuth: []
      summary: Enable/disable an inbound
      tags:
      - inbounds
  /logs:
    get:
      description: Returns recent core and panel log lines from the in-memory ring
        buffer.
      parameters:
      - description: info | warn | error
        in: query
        name: level
        type: string
      - description: substring filter
        in: query
        name: q
        type: string
      - description: max lines (default 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_transport_handler.logEntryDTO'
            type: array
      security:
      - BearerAuth: []
      summary: Recent log lines
      tags:
      - logs
  /subscription/{token}:
    get:
      description: Returns the client's connection config. ?format=base64|plain|json
        (default base64).
      parameters:
      - description: Subscription token
        in: path
        name: token
        required: true
        type: string
      - description: base64 | plain | json
        in: query
        name: format
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Fetch a subscription (public)
      tags:
      - subscription
securityDefinitions:
  BearerAuth:
    description: Enter "Bearer " followed by the JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
